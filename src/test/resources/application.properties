spring.datasource.url=jdbc:h2:mem:ai_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

spring.ai.openai.base-url=https://ai.input.im
spring.ai.openai.api-key=replace-with-api-key
spring.ai.openai.chat.options.model=gpt-5.4

spring.ai.openai.grok.base-url=https://newapi.makelove.cloud
spring.ai.openai.grok.api-key=replace-with-api-key
spring.ai.openai.grok.chat.options.model=grok-4.3
